upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name lutece-consulting.com www.lutece-consulting.com;
    return 301 https://lutece-consulting.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.lutece-consulting.com;
    ssl_certificate /etc/letsencrypt/live/lutece-consulting.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lutece-consulting.com/privkey.pem;
    return 301 https://lutece-consulting.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lutece-consulting.com;

    ssl_certificate /etc/letsencrypt/live/lutece-consulting.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lutece-consulting.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;" always;

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
